<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>24. Filter</title>
    <link rel="stylesheet" type="text/css" href="./css/tui-example-style.css" />
    <link rel="stylesheet" type="text/css" href="../dist/tui-grid.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://uicdn.toast.com/tui.date-picker/v4.1.0/tui-date-picker.css"
    />
  </head>

  <body>
    <div class="description">
  튜토리얼은
  <a
    href="https://github.com/nhn/tui.grid/blob/master/packages/toast-ui.grid/docs/ko/getting-started.md"
    target="_blank"
    >여기에서</a
  >
  볼 수 있습니다.
  <br />
  <strong>
    예제 코드는 babel-standalone에 의해 런타임에 트랜스파일링되므로 사용자의 환경보다 속도가 느릴 수 있습니다.
  </strong>
</div>
    <div class="code-html contents">
      <div id="grid" style="width: 800px;"></div>
    </div>
  </body>
  <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
  <script src="https://uicdn.toast.com/tui.date-picker/v4.1.0/tui-date-picker.js"></script>
  <script type="text/javascript" src="../dist/tui-grid.js"></script>
  <script type="text/javascript" src="./data/basic-dummy.js"></script>
  <script type="text/babel" class="code-js">
    const grid = new tui.Grid({
      el: document.getElementById('grid'),
      data: gridData,
      bodyHeight: 500,
      columns: [
        {
          header: 'Name',
          name: 'name',
          filter: { type: 'text', showApplyBtn: true, showClearBtn: true },
        },
        {
          header: 'Artist',
          name: 'artist',
          filter: 'select',
        },
        {
          header: 'Price',
          name: 'price',
          filter: 'number',
        },
        {
          header: 'Release',
          name: 'release',
          filter: {
            type: 'date',
            options: {
              format: 'yyyy.MM.dd',
            },
          },
        },
        {
          header: 'Genre',
          name: 'genre',
          filter: {
            type: 'text',
            operator: 'OR',
          },
        },
      ],
    });
  </script>
</html>
