<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>2. Complex columns</title>
    <link rel="stylesheet" type="text/css" href="./css/tui-example-style.css" />
    <link rel="stylesheet" type="text/css" href="../dist/tui-grid.css" />
  </head>

  <body>
    <div class="description">
  튜토리얼은
  <a
    href="https://github.com/nhn/tui.grid/blob/master/packages/toast-ui.grid/docs/ko/getting-started.md"
    target="_blank"
    >여기에서</a
  >
  볼 수 있습니다.
  <br />
  <strong>
    예제 코드는 babel-standalone에 의해 런타임에 트랜스파일링되므로 사용자의 환경보다 속도가 느릴 수 있습니다.
  </strong>
</div>
    <div class="code-html contents">
      <div id="grid"></div>
    </div>
  </body>
  <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
  <script type="text/javascript" src="../dist/tui-grid.js"></script>
  <script type="text/javascript" src="./data/basic-dummy.js"></script>
  <script type="text/babel" class="code-js">
    const grid = new tui.Grid({
      el: document.getElementById('grid'),
      scrollX: false,
      scrollY: false,
      data: gridData,
      header: {
        height: 160,
        complexColumns: [
          {
            header: 'Basic',
            name: 'mergeColumn1',
            childNames: ['name', 'artist'],
          },
          {
            header: 'Extra',
            name: 'mergeColumn2',
            childNames: ['type', 'release', 'genre'],
          },
          {
            header: 'Detail',
            name: 'mergeColumn3',
            childNames: ['mergeColumn1', 'mergeColumn2'],
          },
          {
            header: 'Count',
            name: 'mergeColumn4',
            childNames: ['downloadCount', 'listenCount'],
          },
          {
            header: 'Album Info',
            name: 'mergeColumn5',
            childNames: ['price', 'mergeColumn3', 'mergeColumn4'],
          },
        ],
      },
      columns: [
        {
          header: 'Name',
          name: 'name',
        },
        {
          header: 'Artist',
          name: 'artist',
        },
        {
          header: 'Type',
          name: 'type',
        },
        {
          header: 'Release',
          name: 'release',
        },
        {
          header: 'Genre',
          name: 'genre',
        },
        {
          header: 'Price',
          name: 'price',
        },
        {
          header: 'Download',
          name: 'downloadCount',
        },
        {
          header: 'Listen',
          name: 'listenCount',
        },
      ],
    });
  </script>
</html>
